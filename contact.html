<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Allan Family Holidays 2</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Top Navigation Menu Styles matching index.html */
        .top-nav {
            display: flex;
            justify-content: flex-end; /* Pushes the remaining link cleanly to the right */
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eaeaea;
        }
        .nav-link {
            text-decoration: none;
            color: #007bff;
            font-weight: 500;
            font-size: 1.05em;
            transition: color 0.2s ease;
        }
        .nav-link:hover {
            color: #0056b3;
            text-decoration: underline;
        }
        
        /* Gallery Container Styles matching index.html */
        .gallery-container {
            max-width: 700px;
            margin: 0 auto;
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        /* Contact Form Styles designed to blend cleanly */
        .contact-form {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            text-align: left;
        }
        .form-group label {
            font-weight: bold;
            color: #333;
            font-size: 0.95em;
        }
        .form-group input, 
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 1em;
            font-family: inherit;
            box-sizing: border-box;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }
        .form-group input:focus, 
        .form-group textarea:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.2);
        }
        
        /* Matching the primary blue button theme from index.html */
        .submit-btn {
            display: inline-block;
            padding: 12px 25px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease;
            width: fit-content;
            align-self: flex-start;
        }
        .submit-btn:hover {
            background-color: #0056b3;
        }
        .submit-btn:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }

        /* Form Feedback Messages */
        .form-status {
            display: none;
            padding: 12px;
            border-radius: 5px;
            font-size: 0.95em;
            text-align: left;
        }
        .form-status.success {
            display: block;
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .form-status.error {
            display: block;
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        /* Footer Styles matching index.html */
        .gallery-footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #eaeaea;
            text-align: center;
            font-size: 0.9em;
            color: #555;
        }
        .copyright {
            opacity: 0.8;
        }

        @media (max-width: 768px) {
            .submit-btn {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="gallery-container">
        <!-- Top Navigation Menu -->
        <nav class="top-nav">
            <a href="index.html" class="nav-link">&leftarrow; Back to Albums</a>
        </nav>

        <h1>Contact Us</h1>
        <p>Have questions or comments about our holiday photos? Send us a message below!</p>
        
        <!-- Status Notification Box -->
        <div id="formStatus" class="form-status"></div>

        <!-- Contact Form Content -->
        <form id="contact-form">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" rows="5" required></textarea>
            </div>
            <button type="submit">Send Message</button>
        </form>

        <!-- Copyright Footer Footer matching index.html -->
        <footer class="gallery-footer">
            <div class="copyright">
                &copy; 2026 Allan Family. All rights reserved.
            </div>
        </footer>
    </div>

    <!-- JavaScript Hook for API Integration -->
    <script>
        const API_BASE = 'https://idzmzuzar3.execute-api.eu-west-2.amazonaws.com/prod';
    document.getElementById('contact-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                message: document.getElementById('message').value
            };

            try {
                const response = await fetch(`${API_BASE}/contact`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });

                if (response.ok) {
                    alert('Thank You! Message sent successfully!');
                    document.getElementById('contact-form').reset();
                } else {
                    alert('Failed to send message. Please try again.');
                }
            } catch (err) {
                alert('Error connecting to the service.');
            }
        });
    </script>
</body>
</html>
