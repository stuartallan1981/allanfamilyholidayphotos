<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Holiday Photo Albums</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .album-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 30px;
            
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }
        .album-link {
            display: flex;
            align-items: center;
            padding: 10px 25px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 1.2em;
            text-align: left;
            justify-content: flex-start;
            transition: background-color 0.3s ease;
            width: auto; 
            max-width: 100%;
        }
        .album-link:hover {
            background-color: #0056b3;
        }
        .album-link-thumbnail {
            width: 75px;
            height: 50px;
            object-fit: cover;
            border-radius: 3px;
            margin-right: 15px;
        }
        .album-link-text {
            flex-grow: 1;
            display: flex;
            flex-direction: column; /* Stack the two lines vertically */
            justify-content: center;
        }
        .album-link-title {
            font-size: 1em;
            font-weight: bold;
            line-height: 1.3;
        }
        .album-link-subtitle {
            font-size: 0.80em;
            font-weight: normal;
            opacity: 0.85; /* Slightly lighter than the main title */
            line-height: 1.3;
            margin-top: 2px;
        }
        .gallery-container {
            max-width: 700px;
            margin: 0 auto;
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        @media (max-width: 768px) {
            .album-list {
                grid-template-columns: 1fr;
                width: 90%;
            }
            .album-link {
                justify-content: center;
                padding: 15px 10px;
            }
            .album-link-thumbnail {
                margin-right: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="gallery-container">
        <h1>Allan Family Holiday Photo Albums</h1>
        <p>Select an album below to view photos from that trip:</p>
        <div class="album-list">
            <a href="South_Africa.html" class="album-link">
                <img src="https://s3.eu-west-2.amazonaws.com/www.allanfamilyholidayphotos.com/thumbnails/south-africa-thumb.jpg" alt="South Africa Thumbnail" class="album-link-thumbnail">
                <span class="album-link-text">
                <span class="album-link-title">South Africa</span>
                <span class="album-link-subtitle">June 2026</span>
            </a>
            <a href="South_Korea.html" class="album-link">
                <img src="https://s3.eu-west-2.amazonaws.com/www.allanfamilyholidayphotos.com/thumbnails/south-korea-thumb.jpg" alt="South Korea Thumbnail" class="album-link-thumbnail">
                <span class="album-link-text">
                <span class="album-link-title">South Korea</span>
                <span class="album-link-subtitle">June 2025</span>                
            </a>
            <a href="Japan.html" class="album-link">
                <img src="https://s3.eu-west-2.amazonaws.com/www.allanfamilyholidayphotos.com/thumbnails/japan-thumb.jpg" alt="Japan Thumbnail" class="album-link-thumbnail">
                <span class="album-link-text">
                <span class="album-link-title">Japan</span>
                <span class="album-link-subtitle">May - June 2025</span>            
            </a>
            <a href="Los_Angeles.html" class="album-link">
                <img src="https://s3.eu-west-2.amazonaws.com/www.allanfamilyholidayphotos.com/thumbnails/usa-thumb.jpg" alt="USA Thumbnail" class="album-link-thumbnail">
                <span class="album-link-text">
                <span class="album-link-title">Los Angeles</span>
                <span class="album-link-subtitle">November 2024</span>                
            </a>
            <a href="New_Zealand.html" class="album-link">
                <img src="https://s3.eu-west-2.amazonaws.com/www.allanfamilyholidayphotos.com/thumbnails/new-zealand-thumb.jpg" alt="New Zealand Thumbnail" class="album-link-thumbnail">
                <span class="album-link-text">
                <span class="album-link-title">New Zealand</span>
                <span class="album-link-subtitle">October 2024</span>                
            </a>
            <a href="Hong_Kong.html" class="album-link">
                <img src="https://s3.eu-west-2.amazonaws.com/www.allanfamilyholidayphotos.com/thumbnails/hong-kong-macau-thumb.jpg" alt="Hong Kong and Macau Thumbnail" class="album-link-thumbnail">
                <span class="album-link-text">
                <span class="album-link-title">Hong Kong & Macau</span>
                <span class="album-link-subtitle">August 2019</span>                
            </a>
            <a href="Australia.html" class="album-link">
                <img src="https://s3.eu-west-2.amazonaws.com/www.allanfamilyholidayphotos.com/thumbnails/australia-thumb.jpg" alt="Australia Thumbnail" class="album-link-thumbnail">
                <span class="album-link-text">
                <span class="album-link-title">Australia</span>
                <span class="album-link-subtitle">July - August 2019</span>                
            </a>
            <a href="Singapore.html" class="album-link">
                <img src="https://s3.eu-west-2.amazonaws.com/www.allanfamilyholidayphotos.com/thumbnails/singapore-thumb.jpg" alt="Singapore Thumbnail" class="album-link-thumbnail">
                <span class="album-link-text">
                <span class="album-link-title">Singapore</span>
                <span class="album-link-subtitle">July 2019</span>                
            </a>                        
        </div>
    </div>
</body>
</html>
